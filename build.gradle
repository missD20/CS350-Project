plugins {
    id 'java'
    id 'application'
}

group = 'edu.odu.cs.cs350'
version = '1.0'

repositories {
    mavenCentral()
}


dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.7.0'
    testImplementation 'org.hamcrest:hamcrest-library:3.0'
}

application {
    mainClass = ''
}

test {
    useJUnitPlatform()


}

jar {
    manifest {
        attributes 'Main-Class' : ''
    }
}